[build]
  # Applique les migrations Prisma sur la base (DATABASE_URL fourni par Netlify)
  # puis build Next.js.
  command = "pnpm prisma migrate deploy && pnpm build"
  publish = ".next"

# Le plugin officiel adapte le runtime Next.js (App Router, route handlers,
# middleware) à Netlify Functions/Edge. Netlify l'installe automatiquement.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# En-têtes de sécurité (T3.1) déclarés en natif Netlify plutôt que via
# next.config headers() pour éviter la traduction du plugin sur la CSP.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[build.environment]
  NODE_VERSION = "20"

# Variables à définir dans l'UI Netlify (Site settings → Environment) :
#   DATABASE_URL     → chaîne Postgres (Neon/Supabase)
#   NEXTAUTH_SECRET  → secret aléatoire (openssl rand -base64 32)
#   NEXTAUTH_URL     → URL publique du site (ex. https://pmostrategic.netlify.app)
#
# Le schéma Postgres doit être initialisé une fois (prisma db push + db:seed)
# en pointant DATABASE_URL sur la base Neon.
