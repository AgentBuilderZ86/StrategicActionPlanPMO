# CI — filet de sécurité (dette #1) : typecheck, lint et tests sur chaque PR.
# À rendre obligatoire dans GitHub : Settings → Branches → protection de main
# → Require status checks → « qualite ».
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  qualite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Dépendances
        run: pnpm install --frozen-lockfile

      - name: Client Prisma
        run: pnpm prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Tests
        run: pnpm test
